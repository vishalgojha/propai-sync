services:
  - type: web
    name: PropAi Sync
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: PROPAI_STATE_DIR
        value: /data/.propai
      - key: PROPAI_WORKSPACE_DIR
        value: /data/workspace
      - key: PROPAI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: propai-data
      mountPath: /data
      sizeGB: 1


