services:
  propai-gateway:
    image: ${PROPAI_IMAGE:-propai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      PROPAI_GATEWAY_TOKEN: ${PROPAI_GATEWAY_TOKEN:-}
      PROPAI_GATEWAY_BIND: ${PROPAI_GATEWAY_BIND:-lan}
      PROPAI_GATEWAY_PORT: ${PROPAI_GATEWAY_PORT:-18789}
      PROPAI_GATEWAY_ALLOW_UNCONFIGURED: "1"
      PROPAI_ALLOW_INSECURE_PRIVATE_WS: ${PROPAI_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${PROPAI_CONFIG_DIR}:/home/node/.propai
      - ${PROPAI_WORKSPACE_DIR}:/home/node/.propai/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg PROPAI_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with PROPAI_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${PROPAI_GATEWAY_PORT:-18789}:18789"
      - "${PROPAI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command: ["node", "dist/entry.js"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s



