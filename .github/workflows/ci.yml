name: PropAI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          npm install -g pnpm@10.23.0
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure A2UI fallback bundle
        shell: bash
        run: |
          if [[ ! -f src/canvas-host/a2ui/a2ui.bundle.js ]]; then
            mkdir -p src/canvas-host/a2ui
            printf '%s\n' \
              '// CI fallback bundle when A2UI sources are not present in checkout.' \
              'globalThis.__A2UI_CI_PLACEHOLDER__ = true;' \
              > src/canvas-host/a2ui/a2ui.bundle.js
          fi

      - name: Build runtime
        run: pnpm build

      - name: CLI smoke test
        run: node propai.mjs --help
