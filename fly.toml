# PropAi Sync Fly.io deployment configuration
# See https://fly.io/docs/reference/configuration/

app = "PropAi Sync"
primary_region = "iad" # change to your closest region

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
# Fly uses x86, but keep this for consistency
PROPAI_PREFER_PNPM = "1"
PROPAI_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=1536"
PROPAI_GATEWAY_PORT = "3000"
PROPAI_GATEWAY_BIND = "lan"
PROPAI_GATEWAY_ALLOW_UNCONFIGURED = "1"

[processes]
app = "node dist/entry.js"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false # Keep running for persistent connections
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-2x"
memory = "2048mb"

[mounts]
source = "PROPAI_data"
destination = "/data"


