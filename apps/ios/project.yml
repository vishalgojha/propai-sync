name: PropAi Sync
options:
  bundleIdPrefix: ai.propai
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  PropAiSyncKit:
    path: ../shared/PropAiSyncKit
  Swabble:
    path: ../../Swabble

schemes:
  PropAiSync:
    shared: true
    build:
      targets:
        PropAiSync: all
    test:
      targets:
        - PropAiSyncTests
        - PropAiSyncLogicTests
  PropAiSyncLogicTests:
    shared: true
    build:
      targets:
        PropAiSyncLogicTests: all
    test:
      targets:
        - PropAiSyncLogicTests

targets:
  PropAiSync:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: PropAiSyncShareExtension
        embed: true
      - target: PropAiSyncActivityWidget
        embed: true
      - target: PropAiSyncWatchApp
      - package: PropAiSyncKit
      - package: PropAiSyncKit
        product: PropAiSyncChatUI
      - package: PropAiSyncKit
        product: PropAiSyncProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/PropAiSync.entitlements
        CODE_SIGN_STYLE: "$(PROPAI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(PROPAI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(PROPAI_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(PROPAI_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PropAi Sync
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.propai.ios
            CFBundleURLSchemes:
              - PropAi Sync
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.propai.ios.bgrefresh
        NSLocalNetworkUsageDescription: PropAi Sync discovers and connects to your PropAi Sync gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _propai-gw._tcp
        NSCameraUsageDescription: PropAi Sync can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: PropAi Sync uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: PropAi Sync can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: PropAi Sync needs microphone access for voice wake.
        NSMotionUsageDescription: PropAi Sync may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: PropAi Sync needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: PropAi Sync uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  PropAiSyncShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: PropAiSyncKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(PROPAI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(PROPAI_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PROPAI_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(PROPAI_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: PropAi Sync Share
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  PropAiSyncActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/PropAiSyncActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(PROPAI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(PROPAI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(PROPAI_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: PropAi Sync Activity
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PropAiSyncWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: PropAiSyncWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PROPAI_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: PropAi Sync
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(PROPAI_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  PropAiSyncWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(PROPAI_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: PropAi Sync
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(PROPAI_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  PropAiSyncTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: PropAiSync
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(PROPAI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(PROPAI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.propai.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PropAiSync.app/PropAiSync"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: PropAiSyncTests
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"

  PropAiSyncLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: PropAiSyncKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(PROPAI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(PROPAI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.propai.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: PropAiSyncLogicTests
        CFBundleShortVersionString: "$(PROPAI_MARKETING_VERSION)"
        CFBundleVersion: "$(PROPAI_BUILD_VERSION)"





